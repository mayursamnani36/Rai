version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql_container
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: rai
      MYSQL_ROOT_PASSWORD: 0000
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: rai_container
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/rai
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
